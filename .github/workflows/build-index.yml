name: Build Overture index on Hetzner Cloud

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Overture release version (e.g. 2026-03-18.0)"
        required: false
        default: ""
      themes:
        description: "Comma-separated themes to build"
        required: false
        default: "addresses,places,transportation,base,buildings"
      server_type:
        description: "Hetzner server type (ccx43=16CPU/64GB, ccx53=32CPU/128GB, ccx63=48CPU/192GB)"
        required: false
        default: "ccx63"

jobs:
  # ── 1. Spin up Hetzner Cloud runner ────────────────────────────
  create-runner:
    name: Create Hetzner runner
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.create.outputs.label }}
      server_id: ${{ steps.create.outputs.server_id }}
    steps:
      - name: Create runner
        id: create
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: create
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: overture-${{ inputs.server_type }}-${{ github.run_id }}
          server_type: ${{ inputs.server_type }}
          location: nbg1
          image: ubuntu-24.04

  # ── 2. Run the index build on Hetzner ─────────────────────────
  build:
    name: Build index
    needs: create-runner
    runs-on: ${{ needs.create-runner.outputs.label }}
    timeout-minutes: 240
    env:
      # Self-hosted Hetzner runner runs as root with no HOME — DuckDB and uv need it
      HOME: /root
    steps:
      - uses: actions/checkout@v4

      - name: System info
        run: |
          echo "OS:   $(uname -a)"
          echo "CPUs: $(nproc)"
          echo "RAM:  $(free -h | grep Mem | awk '{print $2}')"
          echo "Disk: $(df -h . | tail -1 | awk '{print $4}') free"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Install s5cmd (parallel S3 uploader)
        run: |
          curl -sL https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz \
            | tar xz -C /usr/local/bin s5cmd
          s5cmd version

      - name: Pre-install DuckDB extensions
        run: |
          uv run python -c "
          import duckdb
          con = duckdb.connect()
          con.install_extension('spatial')
          con.install_extension('httpfs')
          con.install_extension('h3', repository='community')
          print('Extensions installed')
          "

      - name: Run pipeline
        run: |
          uv run python main.py \
            --release "${{ inputs.release }}" \
            --themes "${{ inputs.themes }}"
        env:
          OVERTURE_RELEASE: ${{ inputs.release }}
          OVERTURE_THEMES: ${{ inputs.themes }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PREFIX: ${{ secrets.S3_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

  # ── 3. Always tear down the runner ────────────────────────────
  delete-runner:
    name: Delete Hetzner runner
    needs:
      - create-runner
      - build
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Delete runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: delete
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ needs.create-runner.outputs.label }}
          server_id: ${{ needs.create-runner.outputs.server_id }}
